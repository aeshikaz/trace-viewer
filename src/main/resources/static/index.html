<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trace Viewer</title>
<style>
  body {
    margin: 0;
    background: #0d1117;
    color: #d6dce5;
    font-family: 'Courier New', monospace;
    padding: 40px 24px;
  }
  .wrap { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .subtitle { color: #7b8494; font-size: 13px; margin-bottom: 28px; }
  .search-row { display: flex; gap: 8px; margin-bottom: 20px; }
  input {
    flex: 1; background: #151b23; border: 1px solid #262c36;
    color: #d6dce5; padding: 10px 12px; font-family: inherit; font-size: 14px;
  }
  button {
    background: #4fd1c5; color: #05201d; border: none;
    padding: 10px 18px; font-family: inherit; font-weight: bold; cursor: pointer;
  }
  #status { color: #7b8494; font-size: 13px; margin-bottom: 16px; }
  .row {
    display: grid; grid-template-columns: 150px 1fr 70px;
    align-items: center; gap: 12px; margin-bottom: 14px; font-size: 13px;
  }
  .track { background: #0a0e14; height: 20px; position: relative; overflow: hidden; }
  .bar { position: absolute; top: 0; height: 100%; background: #4fd1c5; }
  .bar.slowest { background: #e5534b; }
  .bar.total { background: #4a5568; }
  .duration { text-align: right; color: #7b8494; }
</style>
</head>
<body>
<div class="wrap">
  <h1>trace viewer</h1>
  <div class="subtitle">paste a trace ID to see how a request moved through each service</div>

  <div class="search-row">
    <input id="traceInput" type="text" placeholder="e.g. a1b2c3d4" />
    <button onclick="loadTrace()">Look up</button>
  </div>
  <div id="status"></div>
  <div id="rows"></div>
</div>

<script>
async function loadTrace() {
  const traceId = document.getElementById('traceInput').value.trim();
  const statusEl = document.getElementById('status');
  const rowsEl = document.getElementById('rows');
  rowsEl.innerHTML = '';

  if (!traceId) {
    statusEl.textContent = 'Enter a trace ID first.';
    return;
  }

  statusEl.textContent = 'Looking up ' + traceId + '...';

  const res = await fetch('/api/trace/' + traceId);
  const spans = await res.json();

  if (spans.length === 0) {
    statusEl.textContent = 'No spans found for "' + traceId + '".';
    return;
  }

  statusEl.textContent = spans.length + ' service(s) involved in this trace.';

  const earliestStart = Math.min(...spans.map(s => s.startTimestamp));
  const latestEnd = Math.max(...spans.map(s => s.startTimestamp + s.durationMs));
  const totalSpan = Math.max(latestEnd - earliestStart, 1);
  // front-door is the total of all the others, not a real unit of work --
// exclude it when deciding which service was the actual bottleneck
const comparableSpans = spans.filter(s => s.service !== 'front-door');
const slowest = comparableSpans.length > 0
  ? comparableSpans.reduce((a, b) => (b.durationMs > a.durationMs ? b : a))
  : spans[0];

  spans.forEach(s => {
    const offsetPct = ((s.startTimestamp - earliestStart) / totalSpan) * 100;
    const widthPct = Math.max((s.durationMs / totalSpan) * 100, 1);

    const row = document.createElement('div');
    row.className = 'row';
    let barClass = '';
if (s.service === 'front-door') {
  barClass = 'total';
} else if (s.service === slowest.service) {
  barClass = 'slowest';
}

row.innerHTML = `
  <div>${s.service}</div>
  <div class="track">
    <div class="bar ${barClass}"
         style="left:${offsetPct}%; width:${widthPct}%"></div>
  </div>
  <div class="duration">${s.durationMs}ms</div>
`;
    rowsEl.appendChild(row);
  });
}
</script>
</body>
</html>
